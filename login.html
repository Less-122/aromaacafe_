<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
    <div class = "container">
        <div class="form-container">
            <div class="form" id="form">
                <form class="login" action="#" method="POST">
                    <h2>Bienvenid@ </h2>
                    <div class="input">
                        <label for="login-email">Email</label>
                        <input type="email" name="email" id="login-email" placeholder="Ingrese su correo" required>
                    </div>
                    <div class="input">
                        <label for="login-password">Contraseña</label>
                        <input type="password" name="password" id="login-password" placeholder="ingrese su contraseña"  required>
                    </div>
                    <div class="buttons">
                        <button>Iniciar sesión</button>
                    </div>
                        <p class="cuenta">¿No tiene una cuenta? <a href="#" id="sign-up">Crear cuenta</a></p>
                </form>
                <form class="registro" action="#" method="POST">
                    <h2>Crear cuenta</h2>
                    <p>Usa tu email para registrarte</p>
                    <div class="input">
                        <label for="reg-nombre">Nombre</label>
                        <input type="text" name="nombre" id="reg-nombre" placeholder="Ingrese su nombre" required>
                    </div>
                    <div class="input">
                        <label for="reg-nombre">Apellido</label>
                        <input type="text" name="nombre" id="reg-nombre" placeholder="Ingrese su apellido" required>
                    </div>
                    <div class="input">
                        <label for="reg-email">Email</label>
                        <input type="email" name="email" id="reg-email" placeholder="Ingrese su correo" required>
                    </div>
                    <div class="input">
                        <label for="reg-password">Contraseña</label>
                        <input type="password" name="password" id="reg-password" placeholder="Ingrese una contraseña" required>
                    </div>
                    <div class="buttons">
                        <button>Registrar</button>
                    </div>
                        <p class="cuenta">¿Ya tiene una cuenta? <a href="#" id="sign-in">Iniciar sesión</a></p>
                </form>
            </div>
        </div>

            <div class="banner">
                <div class="logo_container">
                    <img src="img/LogoCafetería.png" alt="">
                </div>
            </div>
    </div>
    <script src="js/login.js"></script>
</body>
</html>
